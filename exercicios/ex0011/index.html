<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML</title>
</head>
<body>
    <h1>Imagens dinâmicas</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.</p>

    <picture>
        <source media="(max-width:750px)" srcset="fotos/pequena.png" type="image/png">
        <source media="(max-width: 1050px )" srcset="fotos/media.png" type="image/png">
        <img src="fotos/grande.PNG" alt="Imagem flexível">
    </picture>

    <h1>Reproduzindo áudios</h1>
    <p>Vamos aprender a reproduzir áudio em HTML5</p>
    <audio preload="metadata" autoplay controls loop>
        <source src="midia/Stake Out - Alex Jones _ Xander Jones.mp3" type="audio/mpeg">
        <source src="midia/Stake Out - Alex Jones _ Xander Jones.ogg" type="audio/ogg">
        <source src="midia/Stake Out - Alex Jones _ Xander Jones.wav" type="audio/wav">
        <p>Infelizmente seu navegador não consegue reproduzir áudio. <a href="midia/Stake Out - Alex Jones _ Xander Jones.mp3">Clique aqui para baixar o arquivo MP3</a>.</p>
    </audio>
    
</body>
</html>
