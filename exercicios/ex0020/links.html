<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>

        /*
            #  = id
            .  = class
            :  = pseudo-class
            :: = pseudo-element
            >  = filho direto
        */

        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        a:link{
            color: red;
            text-decoration: none;
        }

        a:visited{
            color: blue;
            text-decoration: none;
        }

        a:hover{
            color: rgb(147, 67, 201);
            text-decoration: underline;
        }

         a:active{
            color: orange;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://github.com/joaovictorkim" target="_blank">Repositório GitHub</a></li>
        <li><a href="https://youtube.com/cursoemvideo" target="_blank">Canal do Youtube</a></li>
        <li><a href="https://www.cursoemvideo.com" target="_blank">Site do curso em vídeo</a></li>
    </ul>
</body>
</html>
