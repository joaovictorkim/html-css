<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de Caixas</title>
    <style>
        h1{ /* box-level */
            background-color: lightgray;
            height: 37px;
            width: 399px;

            border: 5px solid rgb(158, 177, 240);

            padding: 10px;

            margin: 20px auto 40px auto;

            outline: 5px solid rgb(158, 177, 240);
        }

        a{ /* inline-level */
            border-width: 10px;
            border-style: solid;
            border-color: red;
        }

    </style>
</head>
<body>
    <h1>Exemplo de caixa block-level </h1>
    <p>Parágrafos também são exemplos de block-level, mas os <a href="#">links são exemplos de caixas inline-level.</a>Vamos ver como tudo isso funciona</p>
</body>
</html>
